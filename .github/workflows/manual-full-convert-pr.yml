name: Manual full convert with PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  convert-and-create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Reset branches and run conversion pipeline
        id: convert
        shell: bash
        run: |
          set -uo pipefail

          git fetch origin main
          git reset --hard origin/main
          git clean -fdx -e "binaryData/"
          rm -rf migrated-ts tsconfig.tsbuildinfo tsc_output.log tsc_stats.log

          npm install

          convert_exit=0
          tsc_exit=0
          stats_exit=0

          npm run convert:full || convert_exit=$?

          if [ "${convert_exit}" -eq 0 ]; then
            node tools/as3-to-ts/heal-signature-params.js --input migrated-ts || true
            node tools/as3-to-ts/fix-class-signatures.js --input migrated-ts --scope agi || true
            node tools/as3-to-ts/fix-ts2695-sequences.js --input migrated-ts || true
            node tools/as3-to-ts/resolve-imports.js --input migrated-ts || true

            npx tsc --build --force > tsc_output.log 2>&1 || tsc_exit=$?
            node tools/as3-to-ts/fix-implicit-this.js --input migrated-ts --tsc-log tsc_output.log || true
            
            tsc_exit=0
            npx tsc --build --force > tsc_output.log 2>&1 || tsc_exit=$?
            
            ERROR_SLICE_RADIUS=10 MAX_ERROR_CONTEXTS=5 MAX_AGI_ERROR_CONTEXTS=5 MAX_ERROR_MESSAGES_PER_CODE=5 npm run tsc:stats | tee tsc_stats.log || stats_exit=$?
          else
            echo "Конвертация провалилась с кодом: ${convert_exit}" | tee tsc_stats.log
          fi

          echo "convert_exit=${convert_exit}" >> "$GITHUB_OUTPUT"
          echo "tsc_exit=${tsc_exit}" >> "$GITHUB_OUTPUT"
          echo "stats_exit=${stats_exit}" >> "$GITHUB_OUTPUT"

      - name: Upload tsc stats log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsc-stats-log
          path: tsc_stats.log
          if-no-files-found: warn
          retention-days: 3

      - name: Cleanup before PR
        if: always()
        run: |
          echo "Removing node_modules and temp logs..."
          rm -rf node_modules
          rm -f tsc_output.log
          # tsc_stats.log оставляем, чтобы прочитать его в следующем шаге

      - name: Create pull request
        if: always()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update converted TS artifacts"
          branch: "automation/manual-full-convert-${{ github.run_id }}"
          delete-branch: true
          title: "chore: manual full convert TS artifacts"
          body: |
            This PR was created automatically by workflow `${{ github.workflow }}`.

            ### Exit Codes:
            - Convert: `${{ steps.convert.outputs.convert_exit }}`
            - TSC: `${{ steps.convert.outputs.tsc_exit }}`
            - Stats: `${{ steps.convert.outputs.stats_exit }}`

            ### TSC Stats Summary:
            ```text
            $([ -f tsc_stats.log ] && cat tsc_stats.log | head -n 30 || echo "No stats available")
            ```
          labels: |
            automation
            convert
