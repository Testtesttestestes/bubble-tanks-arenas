name: Main merge AGI convert and tsc analysis

on:
  push:
    branches:
      - main

jobs:
  convert-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Reset branches and run conversion pipeline
        shell: bash
        run: |
          set -euo pipefail

          clear || true

          # 1. Сброс веток
          git fetch origin main
          git reset --hard origin/main

          # 2. Очистка репозитория, ИСКЛЮЧАЯ папку с исходниками binaryData
          # Мы добавляем -e "binaryData/" чтобы git clean не трогал её
          git clean -fdx -e "binaryData/"

          # 3. Принудительное удаление результатов прошлой конвертации
          rm -rf migrated-ts tsconfig.tsbuildinfo tsc_output.log tsc_stats.log

          # 4. Установка зависимостей (только если они удалились)
          npm install

          # 5. ГЕНЕРИРУЕМ файлы (scripts + AGI) с проверкой на ошибку
          # Если конвертация упадет, скрипт не пойдет дальше
          npm run convert:full || { echo "Конвертация провалилась"; exit 1; }

          # 6. ВЫПОЛНЯЕМ ВСЕ ЛОКАЛЬНЫЕ ПРАВКИ ДО КОМПИЛЯЦИИ
          # 6.1. Лечим сигнатуры параметров
          node tools/as3-to-ts/heal-signature-params.js --input migrated-ts
          # 6.2. Чиним class-signatures
          node tools/as3-to-ts/fix-class-signatures.js --input migrated-ts --scope agi
          # 6.3. Распутываем адские запятые декомпилятора (TS2695/TS2351)
          node tools/as3-to-ts/fix-ts2695-sequences.js --input migrated-ts
          # 6.4. Проставляем импорты (очень важно сделать ДО tsc)
          node tools/as3-to-ts/resolve-imports.js --input migrated-ts

          # 7. КОМПИЛИРУЕМ (первый проход - теперь лог будет точным)
          tsc_exit=0
          npx tsc --build --force > tsc_output.log 2>&1 || tsc_exit=$?
          echo "TypeScript build exit code (first pass): ${tsc_exit}"

          # 8. Исправляем implicit this по координатам чистого лога
          node tools/as3-to-ts/fix-implicit-this.js --input migrated-ts --tsc-log tsc_output.log

          # 9. КОМПИЛИРУЕМ (второй проход)
          tsc_exit=0
          npx tsc --build --force > tsc_output.log 2>&1 || tsc_exit=$?
          echo "TypeScript build exit code (after auto-fixes): ${tsc_exit}"

          # 10. Анализируем и завершаем
          ERROR_SLICE_RADIUS=10 MAX_ERROR_CONTEXTS=5 MAX_AGI_ERROR_CONTEXTS=5 MAX_ERROR_MESSAGES_PER_CODE=5 npm run tsc:stats | tee tsc_stats.log
          exit ${tsc_exit}

      - name: Upload tsc stats log
        uses: actions/upload-artifact@v4
        with:
          name: tsc-stats-log
          path: tsc_stats.log
          if-no-files-found: error
          retention-days: 3
