name: Main merge AGI convert and tsc analysis

on:
  push:
    branches:
      - main

jobs:
  convert-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Reset branches and run conversion pipeline
        shell: bash
        run: |
          set -euo pipefail

          clear || true

          # 1. Сброс веток
          git fetch origin main
          git reset --hard origin/main

          # 2. Очистка репозитория, ИСКЛЮЧАЯ папку с исходниками binaryData
          # Мы добавляем -e "binaryData/" чтобы git clean не трогал её
          git clean -fdx -e "binaryData/"

          # 3. Принудительное удаление результатов прошлой конвертации
          rm -rf migrated-ts tsconfig.tsbuildinfo tsc_output.log tsc_stats.log

          # 4. Установка зависимостей (только если они удалились)
          npm install

          # 5. ГЕНЕРИРУЕМ файлы (с проверкой на ошибку)
          # Если конвертация упадет, скрипт не пойдет дальше
          npm run convert:agi || { echo "Конвертация провалилась"; exit 1; }

          # 6. КОМПИЛИРУЕМ
          # Убрал --noIncremental, оставил --force (он заменяет чистку кэша)
          npx tsc --build --force > tsc_output.log 2>&1

          # 7. Анализируем результат
          ERROR_SLICE_RADIUS=10 MAX_ERROR_CONTEXTS=5 MAX_AGI_ERROR_CONTEXTS=5 MAX_ERROR_MESSAGES_PER_CODE=5 npm run tsc:stats | tee tsc_stats.log

      - name: Upload tsc stats log
        uses: actions/upload-artifact@v4
        with:
          name: tsc-stats-log
          path: tsc_stats.log
          if-no-files-found: error
          retention-days: 3
